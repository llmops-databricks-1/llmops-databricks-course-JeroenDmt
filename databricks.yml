bundle:
  name: llmops-databricks-course-JeroenDmt

include:
  - resources/*.yml
  - project_config.yml

variables:
  git_sha:
    description: "Git SHA of the deployed commit"
    default: "local"

artifacts:
  default:
    type: whl
    build: uv build
    path: .

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-85b9247a-ab1b.cloud.databricks.com/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
